<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오버레이 컨트롤 패널</title>
<style>
  :root{--red:#ff4655;--teal:#18e0c4;--bg:#0f1923;--panel:#16202b;--line:#26323f;--dim:#8696a5;--ice:#ece8e1}
  *{box-sizing:border-box}
  body{margin:0;background:#0a0e14;color:var(--ice);font:14px/1.4 system-ui,Segoe UI,sans-serif;padding:16px}
  h1{font-size:18px;margin:0 0 4px;letter-spacing:.5px}
  .sub{color:var(--dim);font-size:12px;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:1100px}
  @media(max-width:780px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin:0 0 12px;border-bottom:1px solid var(--line);padding-bottom:8px}
  .row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  label{font-size:12px;color:var(--dim);min-width:64px}
  input,select{background:#0c141c;border:1px solid var(--line);color:var(--ice);border-radius:5px;padding:6px 8px;font:13px system-ui}
  input[type=text]{width:120px}input[type=number]{width:74px}input[type=color]{width:38px;height:30px;padding:2px}
  button{background:#202c38;border:1px solid var(--line);color:var(--ice);border-radius:5px;padding:6px 11px;cursor:pointer;font:13px system-ui}
  button:hover{border-color:var(--teal)}
  button.primary{background:var(--red);border-color:var(--red);color:#0a0e14;font-weight:700}
  button.on{background:var(--teal);border-color:var(--teal);color:#0a0e14;font-weight:700}
  .step{display:inline-flex;align-items:center;gap:6px}
  .step b{font-size:18px;min-width:26px;text-align:center}
  .players{grid-column:1/-1}
  .pteam{display:grid;grid-template-columns:1fr;gap:8px}
  .pl{display:grid;grid-template-columns:auto 1fr;gap:8px 12px;align-items:center;background:#0c141c;border:1px solid var(--line);border-radius:6px;padding:8px 10px}
  .pl .head{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pl .detail{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px}
  .badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
  .pip-ctl{display:inline-flex;gap:2px;align-items:center}
  .conn{position:fixed;top:12px;right:16px;font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--line)}
  .conn.ok{color:var(--teal);border-color:var(--teal)}
  .conn.off{color:var(--red);border-color:var(--red)}
  details summary{cursor:pointer;color:var(--teal);font-size:12px;margin-bottom:8px}
  .swap{margin-left:auto}

  /* quick control (solo) */
  .card.quick{grid-column:1/-1;border-color:#2a3b49;background:linear-gradient(180deg,#12202c,#0f1923)}
  .quick-readout{display:flex;align-items:center;gap:14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;
    font-size:22px;letter-spacing:1px;margin-bottom:12px;flex-wrap:wrap}
  .quick-readout .vs{color:var(--ice);font-size:15px;background:#0c141c;border:1px solid var(--line);padding:2px 10px;border-radius:20px}
  .quick-readout .r{color:var(--dim);font-size:13px;letter-spacing:1px;margin-left:auto}
  .bigrow{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;margin-bottom:10px}
  .big{padding:16px 10px;font-size:17px;font-weight:700;border-radius:7px;border:1px solid var(--line);
    background:#16222e;color:var(--ice);cursor:pointer;letter-spacing:.5px}
  .big:hover{border-color:var(--teal)}
  .big.a{border-bottom:3px solid var(--red)}
  .big.b{border-bottom:3px solid var(--teal)}
  .big.mid{background:#0c141c;color:var(--dim);font-size:15px;padding-left:20px;padding-right:20px}
  .qrow{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  .qrow .lbl{font-size:12px;color:var(--dim);letter-spacing:1px}
  .qrow button{padding:9px 14px;font-size:14px}
  .qrow button.red{background:var(--red);border-color:var(--red);color:#0a0e14;font-weight:700}
  .qrow button.ghost{background:none;color:var(--dim);border-style:dashed}
  .keys{margin-top:6px;font-size:12px;color:var(--dim);letter-spacing:.3px;line-height:1.9}
  .keys b{display:inline-block;background:#0c141c;border:1px solid var(--line);border-radius:4px;
    padding:1px 7px;color:var(--teal);font-family:'Barlow Condensed';margin:0 1px}
  /* room bar */
  #roombar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#11202c;border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:14px}
  #roombar .rlabel{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
  #roombar b{font-family:'Barlow Condensed',monospace;font-size:18px;color:var(--teal);letter-spacing:1px}
  #roombar input{flex:1;min-width:220px;background:#0c141c;border:1px solid var(--line);color:var(--ice);border-radius:5px;padding:7px 9px;font:12px ui-monospace,Consolas,monospace}
  #roombar .cpy{background:var(--teal);border:none;color:#06090d;border-radius:5px;padding:7px 12px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
  <div class="conn off" id="conn">● 연결 중…</div>
  <h1>발로란트 오버레이 — 컨트롤 패널</h1>
  <div class="sub">값을 바꾸면 OBS 오버레이에 실시간 반영됩니다. 아래 'OBS 오버레이 주소'를 OBS 브라우저 소스에 붙여넣으세요.</div>

  <div id="roombar"></div>
  <div class="grid" id="root"></div>

  <script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
  <script>window.mqtt||document.write('<script src="https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js"><\/script>');</script>
  <script src="shared.js"></script>
  <script src="sync.js"></script>
  <script src="control.js"></script>
</body>
</html>
